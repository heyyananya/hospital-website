<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Superspeciality Doctors Consultation - Administrative Dashboard Console. Enrol doctor profiles, define symptom mappings and audit transaction records.">
  <title>Admin Dashboard | Superspeciality Doctors Consultation</title>
  
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  
  <!-- Custom Styling -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <div id="admin-root">
    <!-- Immediate CSS loading spinner to prevent FOUC / layout shift during React load -->
    <div class="initial-loader" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #f8fafc; font-family: sans-serif;">
      <div class="spinner" style="width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: #0066FF; border-radius: 50%; animation: spin 1s linear infinite;"></div>
      <p style="margin-top: 16px; color: #64748b; font-size: 0.95rem; font-weight: 500;">Loading Admin Console...</p>
    </div>
  </div>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <!-- Legacy utilities for DB sync/reset, followed by React entry -->
  <script src="js/sync.js?v=6"></script>
  <script src="js/init.js?v=6"></script>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
